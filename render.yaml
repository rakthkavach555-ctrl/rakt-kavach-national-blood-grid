services:
  # 1. बैकएंड सर्वर (यह सीधे 'db' फोल्डर के अंदर से रन होगा)
  - type: web
    name: rakt-kavach-backend
    env: node
    plan: free
    rootDirectory: db # रेंडर को सीधे बैकएंड फोल्डर के अंदर भेजेगा
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: node index.js || pnpm start || node server.js
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rakt-kavach-db
          property: connectionString

  # 2. फ्रंटएंड वेबसाइट (इसे 'Static Site' बना दिया है ताकि यह सुपरफास्ट चले)
  - type: static
    name: rakt-kavach-frontend
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    publishPath: artifacts/rakt-kavach/dist # आपकी vite.config.ts के अनुसार सही पाथ

# 3. रेंडर पर ऑटोमैटिक PostgreSQL डेटाबेस
databases:
  - name: rakt-kavach-db
    plan: free
    postgresVersion: "16"
