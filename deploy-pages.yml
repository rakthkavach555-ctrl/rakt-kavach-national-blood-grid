name: Deploy Rakt Kavach to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sovereign Source Checkout
        uses: actions/checkout@v4

      - name: Initialize Core Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          # मुख्य सब-फोल्डर के अंदर के पैकेज को कैशे लॉक करना
          cache-dependency-path: 'artifacts/rakt-kavach/package-lock.json'

      - name: Clean Install National Dependencies Matrix
        run: npm ci
        working-directory: artifacts/rakt-kavach

      - name: Build Secure Production Bundle
        run: npm run build
        working-directory: artifacts/rakt-kavach

      - name: Configure GitHub Pages Context
        uses: actions/configure-pages@v4

      - name: Upload Clean Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 🌟 यह आपके मुख्य फोल्डर के अंदर बने फाइनल dist फोल्डर को सीधे एक्सट्रैक्ट कर लेगा
          path: './artifacts/rakt-kavach/dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Execute Live Push to National Blood Grid
        id: deployment
        uses: actions/deploy-pages@v4
