name: Deploy Rakt Kavach to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sovereign Source Checkout
        uses: actions/checkout@v4

      - name: Initialize Core Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Clean Install National Dependencies Matrix
        run: npm ci

      - name: Build Secure Production Bundle
        run: npm run build

      - name: Configure GitHub Pages Context
        uses: actions/configure-pages@v4

      - name: Upload Clean Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Execute Live Push to National Blood Grid
        id: deployment
        uses: actions/deploy-pages@v4
