openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RAKT KAVACH - National Digital Blood Grid API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: donors
    description: Donor operations
  - name: patients
    description: Patient operations
  - name: hospitals
    description: Hospital operations
  - name: blood-banks
    description: Blood bank operations
  - name: laboratories
    description: Laboratory operations
  - name: ambulances
    description: Ambulance operations
  - name: volunteers
    description: Volunteer operations
  - name: inventory
    description: Blood inventory management
  - name: emergency
    description: Emergency SOS operations
  - name: wallet
    description: Digital blood wallet
  - name: notifications
    description: Notification system
  - name: analytics
    description: Analytics and reporting
  - name: dashboard
    description: Dashboard data
  - name: blood-units
    description: Blood unit lifecycle tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # DONORS
  /donors:
    get:
      operationId: listDonors
      tags: [donors]
      summary: List donors
      parameters:
        - name: bloodGroup
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: eligible
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Donors list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonorListResponse"
    post:
      operationId: createDonor
      tags: [donors]
      summary: Create donor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"

  /donors/{id}:
    get:
      operationId: getDonor
      tags: [donors]
      summary: Get donor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Donor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
    patch:
      operationId: updateDonor
      tags: [donors]
      summary: Update donor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"

  /donors/{id}/donations:
    get:
      operationId: getDonorDonations
      tags: [donors]
      summary: Get donor donation history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Donation history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationHistoryResponse"

  /donors/{id}/eligibility:
    get:
      operationId: checkDonorEligibility
      tags: [donors]
      summary: Check donor eligibility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Eligibility status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityStatus"

  /donors/nearby:
    get:
      operationId: getNearbyDonors
      tags: [donors]
      summary: Get nearby donors
      parameters:
        - name: bloodGroup
          in: query
          required: true
          schema:
            type: string
        - name: lat
          in: query
          schema:
            type: number
        - name: lng
          in: query
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Nearby donors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonorListResponse"

  # PATIENTS
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Patients list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListResponse"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create patient profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}/requests:
    get:
      operationId: getPatientRequests
      tags: [patients]
      summary: Get patient blood requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blood requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequestListResponse"

  # HOSPITALS
  /hospitals:
    get:
      operationId: listHospitals
      tags: [hospitals]
      summary: List hospitals
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Hospitals list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HospitalListResponse"
    post:
      operationId: createHospital
      tags: [hospitals]
      summary: Create hospital
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HospitalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hospital"

  /hospitals/{id}:
    get:
      operationId: getHospital
      tags: [hospitals]
      summary: Get hospital
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hospital
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hospital"

  /hospitals/{id}/inventory:
    get:
      operationId: getHospitalInventory
      tags: [hospitals]
      summary: Get hospital blood inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"

  /hospitals/{id}/requests:
    get:
      operationId: getHospitalRequests
      tags: [hospitals]
      summary: Get hospital blood requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequestListResponse"

  # BLOOD BANKS
  /blood-banks:
    get:
      operationId: listBloodBanks
      tags: [blood-banks]
      summary: List blood banks
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: bloodGroup
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Blood banks list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodBankListResponse"
    post:
      operationId: createBloodBank
      tags: [blood-banks]
      summary: Create blood bank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BloodBankInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodBank"

  /blood-banks/{id}:
    get:
      operationId: getBloodBank
      tags: [blood-banks]
      summary: Get blood bank
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blood bank
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodBank"

  /blood-banks/{id}/inventory:
    get:
      operationId: getBloodBankInventory
      tags: [blood-banks]
      summary: Get blood bank inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"
    post:
      operationId: addBloodBankInventory
      tags: [blood-banks]
      summary: Add inventory to blood bank
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"

  # LABORATORIES
  /laboratories:
    get:
      operationId: listLaboratories
      tags: [laboratories]
      summary: List laboratories
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Laboratories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaboratoryListResponse"
    post:
      operationId: createLaboratory
      tags: [laboratories]
      summary: Create laboratory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LaboratoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Laboratory"

  /laboratories/{id}:
    get:
      operationId: getLaboratory
      tags: [laboratories]
      summary: Get laboratory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Laboratory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Laboratory"

  /laboratories/{id}/tests:
    get:
      operationId: getLaboratoryTests
      tags: [laboratories]
      summary: Get laboratory test results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabTestListResponse"
    post:
      operationId: createLabTest
      tags: [laboratories]
      summary: Create lab test
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabTestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabTest"

  # AMBULANCES
  /ambulances:
    get:
      operationId: listAmbulances
      tags: [ambulances]
      summary: List ambulances
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Ambulances list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmbulanceListResponse"
    post:
      operationId: createAmbulance
      tags: [ambulances]
      summary: Create ambulance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmbulanceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ambulance"

  /ambulances/{id}:
    get:
      operationId: getAmbulance
      tags: [ambulances]
      summary: Get ambulance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ambulance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ambulance"
    patch:
      operationId: updateAmbulance
      tags: [ambulances]
      summary: Update ambulance status/location
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmbulanceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ambulance"

  # VOLUNTEERS
  /volunteers:
    get:
      operationId: listVolunteers
      tags: [volunteers]
      summary: List volunteers
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Volunteers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerListResponse"
    post:
      operationId: createVolunteer
      tags: [volunteers]
      summary: Register as volunteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolunteerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /volunteers/{id}:
    get:
      operationId: getVolunteer
      tags: [volunteers]
      summary: Get volunteer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Volunteer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  # BLOOD INVENTORY
  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List blood inventory
      parameters:
        - name: bloodGroup
          in: query
          schema:
            type: string
        - name: bloodBankId
          in: query
          schema:
            type: integer
        - name: hospitalId
          in: query
          schema:
            type: integer
        - name: state
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"

  /inventory/summary:
    get:
      operationId: getInventorySummary
      tags: [inventory]
      summary: Get inventory summary by blood group
      responses:
        "200":
          description: Inventory summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummaryResponse"

  /inventory/search:
    get:
      operationId: searchInventory
      tags: [inventory]
      summary: Search available blood
      parameters:
        - name: bloodGroup
          in: query
          required: true
          schema:
            type: string
        - name: units
          in: query
          schema:
            type: integer
        - name: state
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySearchResponse"

  # BLOOD UNITS
  /blood-units:
    get:
      operationId: listBloodUnits
      tags: [blood-units]
      summary: List blood units
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: bloodGroup
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Blood units list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodUnitListResponse"
    post:
      operationId: createBloodUnit
      tags: [blood-units]
      summary: Register a new blood unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BloodUnitInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodUnit"

  /blood-units/{id}:
    get:
      operationId: getBloodUnit
      tags: [blood-units]
      summary: Get blood unit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blood unit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodUnit"
    patch:
      operationId: updateBloodUnit
      tags: [blood-units]
      summary: Update blood unit status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BloodUnitUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodUnit"

  /blood-units/{id}/timeline:
    get:
      operationId: getBloodUnitTimeline
      tags: [blood-units]
      summary: Get blood unit lifecycle timeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodUnitTimelineResponse"

  # BLOOD REQUESTS
  /blood-requests:
    get:
      operationId: listBloodRequests
      tags: [inventory]
      summary: List blood requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: bloodGroup
          in: query
          schema:
            type: string
        - name: hospitalId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Blood requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequestListResponse"
    post:
      operationId: createBloodRequest
      tags: [inventory]
      summary: Create blood request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BloodRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequest"

  /blood-requests/{id}:
    get:
      operationId: getBloodRequest
      tags: [inventory]
