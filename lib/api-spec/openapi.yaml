components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # AUTH SCHEMAS
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [CITIZEN, DONOR, PATIENT, HOSPITAL, BLOOD_BANK, LABORATORY, AMBULANCE, VOLUNTEER, DISTRICT_ADMIN, STATE_ADMIN, NATIONAL_ADMIN, SUPER_ADMIN]
        phone:
          type: string
        state:
          type: string
        district:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        isActive:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string

    UserListResponse:
      type: object
      required: [users, total, page, limit]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # DONOR SCHEMAS
    DonorInput:
      type: object
      required: [bloodGroup, dateOfBirth, gender, weight, height]
      properties:
        bloodGroup:
          type: string
          enum: [A+, A-, B+, B-, AB+, AB-, O+, O-]
        dateOfBirth:
          type: string
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
        weight:
          type: number
        height:
          type: number
        abhaId:
          type: string
        address:
          type: string
        state:
          type: string
        district:
          type: string
        photo:
          type: string

    DonorUpdate:
      type: object
      properties:
        weight:
          type: number
        height:
          type: number
        address:
          type: string
        state:
          type: string
        district:
          type: string
        photo:
          type: string

    Donor:
      type: object
      required: [id, userId, bloodGroup, dateOfBirth, gender, weight, height, donationCount, eligibilityStatus, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        bloodGroup:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
        weight:
          type: number
        height:
          type: number
        abhaId:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        photo:
          type: ["string", "null"]
        donationCount:
          type: integer
        lastDonationDate:
          type: ["string", "null"]
        eligibilityStatus:
          type: boolean
        livesImpacted:
          type: integer
        rewardPoints:
          type: integer
        healthCredits:
          type: integer
        createdAt:
          type: string

    DonorListResponse:
      type: object
      required: [donors, total, page, limit]
      properties:
        donors:
          type: array
          items:
            $ref: "#/components/schemas/Donor"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    DonationHistory:
      type: object
      required: [id, donorId, donatedAt, bloodGroup, units, bloodBankName]
      properties:
        id:
          type: integer
        donorId:
          type: integer
        donatedAt:
          type: string
        bloodGroup:
          type: string
        units:
          type: number
        bloodBankName:
          type: string
        certificateUrl:
          type: ["string", "null"]
        impactMessage:
          type: ["string", "null"]

    DonationHistoryResponse:
      type: object
      required: [donations, total]
